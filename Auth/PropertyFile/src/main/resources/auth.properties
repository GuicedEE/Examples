# Apache Shiro-style user/role properties file
# Format: user.<username> = <password>,<role1>,<role2>,...
# Format: role.<rolename> = <permission1>,<permission2>,...

user.admin = admin123,administrator,developer
user.alice = password1,developer
user.bob = password2,readonly

role.administrator = *
role.developer = read,write,execute
role.readonly = read

